<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dados</title>
    <link rel="icon" href="{{ url_for('static', filename='images/Vitracka.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='/paginas/dados.css') }}">
</head>
<body>

    <div class="container">

        <div class="header">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/Vitracka.png') }}" alt="Logo">

                <img src="{{ url_for('static', filename='images/nome.png') }}" alt="Vitracka" class="logo-text">
            </div>

        <div class="progress-bar">
            <div class="progress-fill" style="width: 50%;"></div>
        </div>

    </div>

    <h2>Vamos entender seu perfil</h2>

    <p class="subtitle">
        Essas informações serão usadas para calcular seu metabolismo e montar sua estratégia.
    </p>

    <form method="POST">

        <div class="form-card">

            <label>Sexo</label>

            <div class="gender-options">

                <label class="gender-card">
                    <input type="radio" name="genero" value="masculino" required>
                    Masculino
                </label>

                <label class="gender-card">
                    <input type="radio" name="genero" value="feminino" required>
                    Feminino
                </label>

            </div>

            <label>Peso (kg)</label>
            <input type="number" name="peso" step="0.1" required>

            <label>Altura (cm)</label>
            <input type="number" name="altura" required>

            <label>Idade</label>
            <input type="number" name="idade" required>

        </div>

        <button type="submit">Continuar</button>

    </form>

</div>

</body>
</html>
